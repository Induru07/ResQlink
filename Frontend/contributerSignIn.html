<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contributor Login - ResQLink</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #eef2f5; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; overflow: hidden; }
        .header { background: #27ae60; color: white; padding: 25px; text-align: center; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .alert { padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .alert.error { background: #f8d7da; color: #721c24; }
        .alert.success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Contributor Login</h1>
            <p>Welcome back, Partner</p>
        </div>
        <div class="content">
            <div class="alert" id="alert-box"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <p style="text-align:center; margin-top:15px;"><a href="contributorSignUp.html">Register New Organization</a></p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert-box');

            try {
                // Call Supplier Login Route
                const res = await fetch('http://localhost:5000/api/auth/supplier/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Save Token (Supplier)
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user)); // Contains 'role: supplier'

                    alertBox.textContent = "Login Successful! Redirecting...";
                    alertBox.className = "alert success";
                    alertBox.style.display = "block";
                    
                    // Redirect to Home (or Supplier Dashboard later)
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } else {
                    alertBox.textContent = data.msg || "Login Failed";
                    alertBox.className = "alert error";
                    alertBox.style.display = "block";
                }
            } catch (err) {
                console.error(err);
                alert("Connection Error");
            }
        });
    </script>
</body>
</html>
